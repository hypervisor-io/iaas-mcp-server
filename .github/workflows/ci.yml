name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build, Vet, Format, Test
    runs-on: ubuntu-latest

    steps:
      # go.mod pins the provider's client/ and waiter/ packages by a normal
      # `require` (a pseudo-version of the public hypervisor-io/terraform-provider-iaas
      # module). The dependency is fetched from the module proxy like any other -
      # no sibling checkout or org token needed. A tagged provider release can
      # replace the pseudo-version later (spec 17 Phase 0).
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      # -race catches the token/tenant concurrency invariants the stateless
      # shared server relies on (see the final review).
      - name: Test
        run: go test -race ./...
